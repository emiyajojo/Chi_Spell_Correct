# Role
你是一位精通 NLP 数据增强和 LangChain 的资深算法工程师。

# Background & Goal
我的项目需要为两个模块生成训练数据：
1. SimCSE (当前 2300 条)：需要扩展到约 5000 条。
2. span_src/NER (当前 9900 条)：需要扩展到约 15000 条。
我有一个包含正确股票名的 @/hy-tmp/Chi_Spell_Correct/SimCSE/data/stocks_name.csv

# Task
请编写一个高性能的 Python 脚本，采用“LLM 语境模板生成 + 离线逻辑噪声注入”的混合策略，以对齐上述数据量级。


# Generation Strategy (核心逻辑)
请在代码中实现以下三个阶段：

### 第一阶段：LLM 生成语境模板 (Diverse Context Generation)
- 使用 LangChain + DeepSeek 生成 1500 个**高度多样化**的金融语境模板（Template）。
- 模板示例："受 [ENTITY] 近期财报影响，股价波动剧烈。" 或 "投资者应关注 [ENTITY] 的股权质押风险。"
- 要求模板涵盖：新闻报道、研报摘要、社交媒体讨论、客服咨询等多种风格。

### 第二阶段：离线噪声注入与扩充 (Offline Expansion)
- 读取 `stock_name.csv` 中的所有实体。
- 编写一个 Python 类 `NoiseGenerator`，对实体进行离线处理（不调用 API，节省成本）：
    - 20% Correct: 原样保留。
    - 20% Typos: 利用 pypinyin 或混淆表进行同音/形近字替换。
    - 20% Order: 随机交换字符顺序。
    - 20% Missing: 随机删除 1-2 个字符。
    - 20% Extra: 随机插入金融干扰字。

### 第三阶段：数据对齐与导出
- **针对 SimCSE (目标 5000条)**: 从模板库和 CSV 中随机组合，确保包含 20% 的“完全正确”正样本（source == target），用于抑制过纠。
- **针对 span_src (目标 15000条)**: 将处理后的噪声实体回填至模板，生成 NER 训练对。

### 具体的格式参考 (必须严格一致)：

1. **span_src 模块格式 (train.json)**:
   目标字段：`text` (包含噪声的句子), `stock_name` (从 text 中提取出的实体列表)
   示例：{"text": "扽樫医疗估值类型危险", "stock_name": ["扽樫医疗"]}

2. **SimCSE 模块格式 (train.json)**:
   目标字段：`source` (噪声全句), `target` (正确全句), `source_company` (噪声实体), `target_company` (正确实体)
   示例：{"source": "扽樫医疗估值类型危险", "target": "稳健医疗估值类型危险", "source_company": "扽樫医疗", "target_company": "稳健医疗"}


# Technical Requirements
1. **多线程/异步**: 使用 LangChain 的 `batch` 或 `async` 方法加快模板生成速度。
2. **断点续传**: 实现简单的进度保存机制，防止生成中途断网。
3. **Pydantic 校验**: 使用 Pydantic 确保 LLM 输出的模板格式正确。
4. **Adapter 设计模式**: 编写清晰的转换函数，直接生成 `span_src/train.json` 和 `SimCSE/train.json`。

# Constraints
- 必须包含大量“正确样例”，即输入本身正确时，模型不应做任何改动。
- 最终生成的 JSON 需严格符合我之前提供的格式要求。